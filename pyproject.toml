[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# Make `custom_components` importable however pytest is invoked. Running
# `python -m pytest` happens to put the working directory on sys.path, but a
# bare `pytest` does not -- so without this the suite passes locally and fails
# on a clean checkout.
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "D", "UP", "B", "SIM", "RUF"]
ignore = [
  "D203",  # conflicts with D211
  "D213",  # conflicts with D212
  "D401",  # property docstrings read as noun phrases, which is correct here
  "D403",  # would "correct" the proper noun openHAB to OpenHAB
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D100", "D103"]

[tool.ruff.lint.pydocstyle]
convention = "pep257"
